run:
  timeout: 5m
  working-directory: services/api

linters:
  enable:
    - govet        # go vet — catches real bugs
    - errcheck     # unchecked errors
    - staticcheck  # comprehensive static analysis
    - unused       # unused code
    - gosimple     # simplify code
    - ineffassign  # useless assignments
    - typecheck    # type-checks (required)
  disable-all: false

linters-settings:
  errcheck:
    # These are intentionally fire-and-forget (non-critical side effects)
    exclude-functions:
      - (net/http.ResponseWriter).Write
      - (*go.uber.org/zap.Logger).Sync

issues:
  exclude-rules:
    # Test files can be a bit more relaxed
    - path: _test\.go
      linters: [errcheck]
  # Don't fail on warnings from generated or vendor code
  exclude-dirs:
    - vendor
