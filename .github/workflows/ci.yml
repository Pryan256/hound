name: CI

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main]

jobs:

  # ── Go API ──────────────────────────────────────────────────────────────────
  api:
    name: Go API
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache-dependency-path: services/api/go.sum

      - name: Download modules
        working-directory: services/api
        run: go mod download

      - name: Vet
        working-directory: services/api
        run: go vet ./...

      - name: Build
        working-directory: services/api
        run: go build -o /dev/null ./cmd/main.go

      - name: Lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: services/api
          args: --timeout=5m

  # ── Link widget ─────────────────────────────────────────────────────────────
  link:
    name: Link Widget
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install
        working-directory: packages/link
        run: npm install

      - name: Build
        working-directory: packages/link
        run: npm run build

  # ── Developer portal (Next.js) ───────────────────────────────────────────────
  portal:
    name: Developer Portal
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install
        working-directory: packages/portal
        run: npm install

      - name: Build
        working-directory: packages/portal
        run: npm run build

  # ── Enrichment service (Python) ─────────────────────────────────────────────
  enrichment:
    name: Enrichment Service
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        working-directory: services/enrichment
        run: pip install -r requirements.txt

      - name: Lint
        working-directory: services/enrichment
        run: ruff check .

      - name: Test
        working-directory: services/enrichment
        # Exit code 5 = no tests collected — treat as success
        run: pytest || [ $? -eq 5 ]

  # ── Terraform ───────────────────────────────────────────────────────────────
  terraform:
    name: Terraform Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Init (no backend)
        working-directory: terraform/environments/staging
        run: terraform init -backend=false

      - name: Validate
        working-directory: terraform/environments/staging
        run: terraform validate
