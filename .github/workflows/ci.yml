name: CI

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main]

jobs:
  api:
    name: Go API
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Lint
        uses: golangci/golangci-lint-action@v4
        with:
          working-directory: services/api

      - name: Test
        working-directory: services/api
        run: go test ./... -v -race -coverprofile=coverage.out

      - name: Build
        working-directory: services/api
        run: go build -o bin/api ./cmd/main.go

  link:
    name: Link UI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: packages/link/package-lock.json

      - name: Install
        working-directory: packages/link
        run: npm ci

      - name: Lint
        working-directory: packages/link
        run: npm run lint

      - name: Build
        working-directory: packages/link
        run: npm run build

  portal:
    name: Developer Portal
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: packages/portal/package-lock.json

      - name: Install
        working-directory: packages/portal
        run: npm ci

      - name: Lint
        working-directory: packages/portal
        run: npm run lint

      - name: Build
        working-directory: packages/portal
        run: npm run build

  enrichment:
    name: Enrichment Service
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        working-directory: services/enrichment
        run: pip install -r requirements.txt

      - name: Lint
        working-directory: services/enrichment
        run: ruff check .

      - name: Test
        working-directory: services/enrichment
        run: pytest

  terraform:
    name: Terraform Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Init
        working-directory: terraform/environments/staging
        run: terraform init -backend=false

      - name: Validate
        working-directory: terraform/environments/staging
        run: terraform validate
