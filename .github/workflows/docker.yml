name: Docker

on:
  push:
    branches: [main]

# Only one Docker publish runs at a time; new pushes cancel in-progress ones.
concurrency:
  group: docker-publish
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/hound-api

jobs:
  build-and-push:
    name: Build & push API image
    runs-on: ubuntu-latest

    # Required to push to GHCR
    permissions:
      contents: read
      packages: write

    # Only run when the CI checks pass
    needs: []   # add "api" here once you want to gate on CI (requires both workflows in same file)

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # Always tag :latest on main
            type=raw,value=latest,enable={{is_default_branch}}
            # Short SHA tag for precise rollbacks (e.g. ghcr.io/org/hound-api:abc1234)
            type=sha,prefix=,format=short

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: services/api/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Cache layers in GHCR to speed up subsequent builds
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache
          cache-to:   type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache,mode=max
